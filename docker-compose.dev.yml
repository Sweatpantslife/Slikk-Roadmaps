# Local development database only — run the app itself with `npm run dev`.
#
#   docker compose -f docker-compose.dev.yml up -d
#   npm run setup   # push schema + seed demo data
#   npm run dev
#
# Matches the default DATABASE_URL in .env.example
# (postgresql://slikk:slikk@localhost:5432/slikk).

name: slikk-feedback-hub-dev

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slikk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slikk}
      POSTGRES_DB: ${POSTGRES_DB:-slikk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slikk} -d ${POSTGRES_DB:-slikk}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata-dev:
